services:

  # ─────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: eventhub-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: eventhub
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    networks:
      - public
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eventhub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - public
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: eventhub-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - public
      - internal
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────
  # Application Services
  # ─────────────────────────────────────────────

  main-api:
    build:
      context: ./main-api
      dockerfile: Dockerfile
    container_name: eventhub-main-api
    restart: unless-stopped
    env_file: ./main-api/.env
    ports:
      - "8000:8000"
    volumes:
      - ./main-api:/var/www/html
      - /var/www/html/vendor  # Exclude vendor from bind mount
    networks:
      - public
      - internal
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: eventhub-payment-service
    restart: unless-stopped
    env_file: ./payment-service/.env
    # NOTE: No ports exposed to host — internal only
    networks:
      - internal
    depends_on:
      mysql:
        condition: service_healthy

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: eventhub-notification-service
    restart: unless-stopped
    env_file: ./notification-service/.env
    ports:
      - "8002:8002"
    volumes:
      - ./notification-service/logs:/app/logs
    networks:
      - public
      - internal
    depends_on:
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eventhub-frontend
    restart: unless-stopped
    env_file: ./frontend/.env.local
    ports:
      - "3000:3000"
    networks:
      - public
    depends_on:
      - main-api

# ─────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────
networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true  # No external internet access — payment-service isolation

# ─────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────
volumes:
  mysql_data:
  rabbitmq_data:
